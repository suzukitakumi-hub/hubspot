name: USCPA reactivation monitor

on:
  schedule:
    # Every 15 minutes.
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      apply:
        description: "Actually update HubSpot / post Slack / append Sheets"
        required: true
        default: false
        type: boolean
      delivery:
        description: "Notification delivery mode"
        required: true
        default: slack
        type: choice
        options:
          - slack
          - hubspot
          - both
      lookback_hours:
        description: "HubSpot search lookback hours"
        required: true
        default: "6"
        type: string
      limit_per_sender:
        description: "Max CRM email activities per allowed sender"
        required: true
        default: "200"
        type: string
      max_updates:
        description: "Safety cap for apply runs. 0 means unlimited."
        required: true
        default: "0"
        type: string
      sheet_output:
        description: "Append notification rows to Google Sheets"
        required: true
        default: true
        type: boolean

concurrency:
  group: uscpa-sales-email-open-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      HUBSPOT_PAT: ${{ secrets.HUBSPOT_PAT }}
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
      USCPA_SLACK_CHANNEL_ID: ${{ secrets.USCPA_SLACK_CHANNEL_ID }}
      USCPA_SHEET_SPREADSHEET_ID: ${{ secrets.USCPA_SHEET_SPREADSHEET_ID }}
      LOOKBACK_HOURS: ${{ inputs.lookback_hours || '6' }}
      LIMIT_PER_SENDER: ${{ inputs.limit_per_sender || '200' }}
      MAX_UPDATES: ${{ inputs.max_updates || '0' }}
      DELIVERY: ${{ inputs.delivery || 'slack' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements-hubspot-course-update.txt

      - name: Install dependencies
        run: pip install -r requirements-hubspot-course-update.txt

      - name: Write Google service account JSON
        if: ${{ github.event_name == 'schedule' || inputs.sheet_output == true }}
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON_CONTENT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON_CONTENT }}
        run: |
          test -n "$GOOGLE_SERVICE_ACCOUNT_JSON_CONTENT"
          printf '%s' "$GOOGLE_SERVICE_ACCOUNT_JSON_CONTENT" > "$RUNNER_TEMP/google-service-account.json"
          chmod 600 "$RUNNER_TEMP/google-service-account.json"

      - name: Run monitor
        id: monitor
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ runner.temp }}/google-service-account.json
        run: |
          args=(
            --lookback-hours "$LOOKBACK_HOURS"
            --limit-per-sender "$LIMIT_PER_SENDER"
            --delivery "$DELIVERY"
            --slack-channel-id "$USCPA_SLACK_CHANNEL_ID"
            --max-updates "$MAX_UPDATES"
          )

          if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ inputs.apply }}" = "true" ]; then
            args+=(--apply)
          fi

          if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ inputs.sheet_output }}" = "true" ]; then
            args+=(--sheet-output)
          fi

          python uscpa_sales_email_open_monitor.py "${args[@]}"

      - name: Send run email notification
        if: ${{ always() && vars.USCPA_RUN_EMAIL_NOTIFY == 'true' }}
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          RUN_EMAIL_TO: suzuki.takumi@abitus.co.jp
          RUN_EMAIL_NOTIFY_UNTIL_UTC: "2026-05-19T15:00:00Z"
          MONITOR_OUTCOME: ${{ steps.monitor.outcome }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          WORKFLOW_NAME: ${{ github.workflow }}
        run: |
          python - <<'PY'
          import os
          import smtplib
          import ssl
          import sys
          from datetime import datetime, timezone
          from email.message import EmailMessage

          until_raw = os.environ["RUN_EMAIL_NOTIFY_UNTIL_UTC"]
          until = datetime.fromisoformat(until_raw.replace("Z", "+00:00"))
          now = datetime.now(timezone.utc)
          if now >= until:
              print(f"email notification skipped: expired at {until_raw}")
              sys.exit(0)

          required = ["SMTP_HOST", "SMTP_USERNAME", "SMTP_PASSWORD", "SMTP_FROM", "RUN_EMAIL_TO"]
          missing = [name for name in required if not os.environ.get(name)]
          if missing:
              raise RuntimeError("email notification secrets missing: " + ", ".join(missing))

          outcome = os.environ.get("MONITOR_OUTCOME") or "unknown"
          status_ja = "成功" if outcome == "success" else "失敗"
          subject = f"[GitHub Actions] {os.environ['WORKFLOW_NAME']} {status_ja}"
          body = "\n".join(
              [
                  f"Workflow: {os.environ['WORKFLOW_NAME']}",
                  f"Result: {status_ja} ({outcome})",
                  f"Run: {os.environ['RUN_URL']}",
                  f"Time UTC: {now.isoformat()}",
                  "",
                  "この通知は一時検証用です。",
                  f"停止予定: {until_raw}",
              ]
          )

          message = EmailMessage()
          message["From"] = os.environ["SMTP_FROM"]
          message["To"] = os.environ["RUN_EMAIL_TO"]
          message["Subject"] = subject
          message.set_content(body)

          host = os.environ["SMTP_HOST"]
          port = int(os.environ.get("SMTP_PORT") or "587")
          context = ssl.create_default_context()
          with smtplib.SMTP(host, port, timeout=30) as smtp:
              smtp.starttls(context=context)
              smtp.login(os.environ["SMTP_USERNAME"], os.environ["SMTP_PASSWORD"])
              smtp.send_message(message)

          print(f"email notification sent to {os.environ['RUN_EMAIL_TO']}: {outcome}")
          PY

      - name: Upload monitor details
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: uscpa-sales-email-open-monitor-output
          path: outputs/uscpa_sales_email_open_monitor_*.json
          if-no-files-found: ignore
